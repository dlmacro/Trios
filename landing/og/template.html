<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TRIOS OG</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1200px; height: 630px; overflow: hidden; }

    :root {
      --bg: #020617;
      --bg2: #0b1220;
      --brand: #2563eb;
      --brand-light: #60a5fa;
      --text: #f8fafc;
      --muted: #94a3b8;
      --line: rgba(148,163,184,.10);
    }
    body.theme-light {
      --bg: #f8fafc; --bg2: #eef2ff;
      --text: #0f172a; --muted: #475569;
      --line: rgba(15,23,42,.08);
    }

    body {
      position: relative;
      background: radial-gradient(1100px 700px at 78% 18%, var(--bg2) 0%, var(--bg) 60%);
      font-family: "Poppins", "Segoe UI", system-ui, -apple-system, sans-serif;
      color: var(--text);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 76px 92px 168px;
    }

    /* grid texture */
    .grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: linear-gradient(to bottom right, rgba(0,0,0,.9), transparent 75%);
    }
    /* brand glow */
    .glow {
      position: absolute; top: -180px; right: -120px;
      width: 620px; height: 620px; border-radius: 50%;
      background: radial-gradient(circle, rgba(37,99,235,.45) 0%, transparent 70%);
      filter: blur(40px);
    }
    .glow2 {
      position: absolute; bottom: -220px; left: -160px;
      width: 520px; height: 520px; border-radius: 50%;
      background: radial-gradient(circle, rgba(99,102,241,.22) 0%, transparent 70%);
      filter: blur(50px);
    }
    /* top accent bar */
    .accent {
      position: absolute; top: 0; left: 0; right: 0; height: 10px;
      background: linear-gradient(90deg, #60a5fa, #2563eb 45%, #1e3a8a);
    }

    .content { position: relative; z-index: 2; }

    .brandrow { display: flex; align-items: center; gap: 22px; margin-bottom: 34px; }
    .logo {
      width: 96px; height: 96px; border-radius: 24px;
      background: #fff;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 18px 50px rgba(37,99,235,.40);
    }
    .logo img { width: 64px; height: 64px; object-fit: contain; }
    .wordmark { font-size: 50px; font-weight: 800; letter-spacing: -1px; }
    .wordmark .reg { color: var(--brand-light); }

    .badge {
      display: inline-flex; align-items: center; gap: 12px;
      padding: 10px 22px; border-radius: 999px;
      background: rgba(255,255,255,.06);
      border: 1px solid var(--line);
      font-size: 21px; font-weight: 600; color: var(--brand-light);
      width: max-content;
    }
    .badge .dot {
      width: 11px; height: 11px; border-radius: 50%;
      background: #34d399; box-shadow: 0 0 0 5px rgba(52,211,153,.18);
    }

    h1 {
      margin: 26px 0 0;
      font-size: 64px; line-height: 1.1; font-weight: 800;
      letter-spacing: -1.5px; max-width: 920px;
    }
    h1 .grad {
      background: linear-gradient(120deg, #60a5fa, #2563eb 55%, #1e3a8a);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .sub {
      margin-top: 22px; font-size: 26px; font-weight: 500;
      color: var(--muted); max-width: 820px; line-height: 1.4;
    }

    .foot {
      position: absolute; left: 92px; right: 92px; bottom: 60px;
      display: flex; align-items: center; justify-content: space-between;
      font-size: 22px; color: var(--muted); z-index: 2;
    }
    .pills { display: flex; gap: 14px; }
    .pill {
      padding: 9px 20px; border-radius: 999px;
      background: rgba(255,255,255,.05);
      border: 1px solid var(--line); font-size: 19px; font-weight: 600;
      color: var(--text);
    }
  </style>
</head>
<body>
  <div class="accent"></div>
  <div class="grid"></div>
  <div class="glow"></div>
  <div class="glow2"></div>

  <div class="content">
    <div class="brandrow">
      <div class="logo"><img src="../assets/icon.ico" alt="" /></div>
      <div class="wordmark">TRIOS<span class="reg">®</span></div>
    </div>

    <div class="badge" id="badge"><span class="dot"></span><span id="badge-text">100% Offline · No Server · No Subscription</span></div>

    <h1 id="title">The complete school,<br /><span class="grad">running entirely offline.</span></h1>
    <p class="sub" id="sub">Offline school management for Sri Lankan schools — students, teachers, timetables, exams, marks &amp; ID cards.</p>
  </div>

  <div class="foot">
    <span id="foot-left">trios · Offline School Management System</span>
    <div class="pills">
      <span class="pill">Windows</span>
      <span class="pill">v1.0.0</span>
    </div>
  </div>

  <script>
    /* Customizable via query params:
       ?title=...&sub=...&badge=...&footLeft=...&theme=light|dark
       title supports "|" to force a line break and "*phrase*" for gradient text. */
    const q = new URLSearchParams(location.search);
    const set = (id, val) => { if (val != null) document.getElementById(id).innerHTML = val; };

    if (q.get('theme') === 'light') document.body.classList.add('theme-light');

    if (q.has('title')) {
      const raw = q.get('title')
        .replace(/&/g, '&amp;')
        .replace(/\*(.+?)\*/g, '<span class="grad">$1</span>')
        .replace(/\|/g, '<br />');
      set('title', raw);
    }
    if (q.has('sub'))     set('sub', q.get('sub').replace(/&/g, '&amp;'));
    if (q.has('badge'))   set('badge-text', q.get('badge'));
    if (q.has('footLeft'))set('foot-left', q.get('footLeft'));

    // Signal to the renderer that layout + fonts + image are ready.
    window.__ogReady = false;
    const img = document.querySelector('.logo img');
    const done = () => { document.fonts.ready.then(() => { window.__ogReady = true; }); };
    if (img.complete) done(); else { img.onload = done; img.onerror = done; }
  </script>
</body>
</html>
